<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teleporte Gateway</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0b0f14; color: #eef3f8; line-height: 1.55; }
    main { max-width: 980px; margin: 0 auto; padding: 28px 18px 60px; }
    .card { background: #121923; border: 1px solid #263142; border-radius: 16px; padding: 18px; margin: 14px 0; }
    a { color: #8bd3ff; }
    pre { white-space: pre-wrap; word-break: break-word; background: #080b10; border: 1px solid #263142; border-radius: 12px; padding: 16px; overflow:auto; }
    .muted { color: #a8b3c2; }
  </style>
</head>
<body>
  <main>
    <h1>Teleporte Gateway</h1>
    <div class="card">
      <p><strong>Source Boss:</strong> <code>public/00_LATEST_CHECKPOINT_READ_FIRST.md</code></p>
      <p class="muted">This page does not own the rules. It reads the source-boss checkpoint file.</p>
      <p>
        <a href="/00_LATEST_CHECKPOINT_READ_FIRST.md">Open boss file</a> ·
        <a href="/api/current-rules">Current rules API</a> ·
        <a href="/api/latest">Latest API</a>
      </p>
    </div>
    <div class="card">
      <h2>Current Boss File Content</h2>
      <pre id="boss">Loading...</pre>
    </div>
  </main>
  <script>
    fetch('/00_LATEST_CHECKPOINT_READ_FIRST.md', { cache: 'no-store' })
      .then(r => r.text())
      .then(t => document.getElementById('boss').textContent = t)
      .catch(err => document.getElementById('boss').textContent = 'Failed to load boss file: ' + err);
  </script>
</body>
</html>
